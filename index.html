<script>
  let isSubmitting = false; // Prevent multiple form submissions flag

  const handleForm = async (e) => {
    e.preventDefault(); // Prevent default form submission behavior

    // If already submitting, prevent multiple submissions
    if (isSubmitting) {
      return;
    }

    isSubmitting = true; // Set the flag to prevent duplicate submissions

    const form = document.getElementById('contact-form');
    const submitButton = form.querySelector('button[type="submit"]');
    const loadingText = document.getElementById('loading-text'); // Placeholder for the loading text

    if (!submitButton) {
      console.error('Submit button not found in the form!');
      isSubmitting = false;
      return;
    }

    submitButton.disabled = true; // Disable the submit button to prevent multiple submissions
    loadingText.innerText = 'Loading...'; // Show the loading message

    try {
      // Send email using EmailJS
      await emailjs.sendForm('service_cysqmp7', 'template_cgnfvia', form);

      // Hide the form and show success message
      form.style.display = 'none'; // Hide the form
      loadingText.innerText = 'Email sent successfully!'; // Show success message
    } catch (error) {
      console.error('Error occurred while sending email:', error); // Log the error in case of failure
      loadingText.innerText = 'Failed to send email. Please try again later.'; // Show error message
    } finally {
      submitButton.disabled = false; // Re-enable the submit button after the process completes
      isSubmitting = false; // Reset the flag to allow further submissions
    }
  };

  // Load content from en.json
 // Function to load JSON content
async function loadLanguageContent() {
    try {
        const response = await fetch('/assets/js/en.json');
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        const content = await response.json();
        
        // Populate main banner content
        document.querySelector('#main-banner-heading').textContent = content.main_banner.heading;
        document.querySelector('#main-banner-subheading').textContent = content.main_banner.subheading;
        document.querySelector('#contact-button').textContent = content.main_banner.contact_button;

        // Populate about section
        document.querySelector('#about-heading').textContent = content.about_section.heading.main;
        document.querySelector('#about-subheading').textContent = content.about_section.heading.sub;
        document.querySelector('#guiding-heading').textContent = content.about_section.guiding_heading;
        
        // Populate skills
        document.querySelector('#skill-development').textContent = content.about_section.skills.development;
        document.querySelector('#skill-configuration').textContent = content.about_section.skills.configuration;
        document.querySelector('#skill-support').textContent = content.about_section.skills.support;

        // Populate services section
        document.querySelector('#services-heading').textContent = content.services_section.heading.main;
        document.querySelector('#services-subheading').textContent = content.services_section.heading.sub;

        // Populate service names
        document.querySelector('#service-1-name').textContent = content.services_section.services.sales_cloud.title.split(':')[0];
        document.querySelector('#service-2-name').textContent = content.services_section.services.marketing_cloud.title.split(':')[0];
        document.querySelector('#service-3-name').textContent = content.services_section.services.service_cloud.title.split(':')[0];
        document.querySelector('#service-4-name').textContent = content.services_section.services.experience_cloud.title.split(':')[0];
        document.querySelector('#service-5-name').textContent = content.services_section.services.integrations.title.split(':')[0];

        // Populate service details
        document.querySelector('#service-1-title').textContent = content.services_section.services.sales_cloud.title;
        document.querySelector('#service-1-features').innerHTML = createBenefitsList(content.services_section.services.sales_cloud.benefits);

        document.querySelector('#service-2-title').textContent = content.services_section.services.marketing_cloud.title;
        document.querySelector('#service-2-features').innerHTML = createBenefitsList(content.services_section.services.marketing_cloud.benefits);

        document.querySelector('#service-3-title').textContent = content.services_section.services.service_cloud.title;
        document.querySelector('#service-3-features').innerHTML = createBenefitsList(content.services_section.services.service_cloud.benefits);

        document.querySelector('#service-4-title').textContent = content.services_section.services.experience_cloud.title;
        document.querySelector('#service-4-features').innerHTML = createBenefitsList(content.services_section.services.experience_cloud.benefits);

        document.querySelector('#service-5-title').textContent = content.services_section.services.integrations.title;
        document.querySelector('#service-5-features').innerHTML = createBenefitsList(content.services_section.services.integrations.benefits);

        // Populate contact section
        document.querySelector('#contact-heading').textContent = content.contact_section.heading.main;
        document.querySelector('#contact-subheading').textContent = content.contact_section.heading.sub;
        document.querySelector('#contact-email').textContent = content.contact_section.contact_info.email.value;
        document.querySelector('#contact-location').textContent = content.contact_section.contact_info.location.value;

    } catch (error) {
        console.error('Error loading language content:', error);
    }
}

// Helper function to create benefits list HTML
function createBenefitsList(benefits) {
    return benefits.map(benefit => `<p><i class="fa fa-check"></i> ${benefit}</p>`).join('');
}

// Load content when DOM is ready
document.addEventListener('DOMContentLoaded', loadLanguageContent);
</script>
