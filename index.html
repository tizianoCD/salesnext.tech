<script>
  let isSubmitting = false; // Prevent multiple form submissions flag

  const handleForm = async (e) => {
    e.preventDefault(); // Prevent default form submission behavior

    // If already submitting, prevent multiple submissions
    if (isSubmitting) {
      return;
    }

    isSubmitting = true; // Set the flag to prevent duplicate submissions

    const form = document.getElementById('contact-form');
    const submitButton = form.querySelector('button[type="submit"]');
    const loadingText = document.getElementById('loading-text'); // Placeholder for the loading text

    if (!submitButton) {
      console.error('Submit button not found in the form!');
      isSubmitting = false;
      return;
    }

    submitButton.disabled = true; // Disable the submit button to prevent multiple submissions
    loadingText.innerText = 'Loading...'; // Show the loading message

    try {
      // Send email using EmailJS
      await emailjs.sendForm('service_cysqmp7', 'template_cgnfvia', form);

      // Hide the form and show success message
      form.style.display = 'none'; // Hide the form
      loadingText.innerText = 'Email sent successfully!'; // Show success message
    } catch (error) {
      console.error('Error occurred while sending email:', error); // Log the error in case of failure
      loadingText.innerText = 'Failed to send email. Please try again later.'; // Show error message
    } finally {
      submitButton.disabled = false; // Re-enable the submit button after the process completes
      isSubmitting = false; // Reset the flag to allow further submissions
    }
  };



  // Load content from en.json
 // Function to load JSON content
 async function loadLanguageContent(language = 'en') {
    const response = await fetch(`/assets/js/${language}.json`);
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        const content = await response.json();
        
        // Load header content
        loadHeaderContent(content.header);
        
        // Load main banner content
        loadMainBannerContent(content.main_banner);
        
        // Load about section
        loadAboutContent(content.about_section);
        
        // Load services section
        loadServicesContent(content.services_section);
        
        // Load contact section
        loadContactContent(content.contact_section);
        
        // Load footer content
        loadFooterContent(content.footer);

    } catch (error) {
        console.error('Error loading language content:', error);
    }
}

function switchLanguage() {
    const languageSelector = document.getElementById('language-selector');
    const selectedLanguage = languageSelector.value;
    loadLanguageContent(selectedLanguage);
}


// Load header content
function loadHeaderContent(header) {
    // Logo alt text
    const logo = document.querySelector('.logo img');
    if (logo) logo.alt = header.logo_alt;
    
    // Menu items
    const homeLink = document.querySelector('#home-link');
    if (homeLink) homeLink.textContent = header.menu.home;
    
    const aboutLink = document.querySelector('#about-link');
    if (aboutLink) aboutLink.textContent = header.menu.about;
    
    const servicesLink = document.querySelector('#services-link');
    if (servicesLink) servicesLink.textContent = header.menu.services;
    
    const contactLink = document.querySelector('#contact-link');
    if (contactLink) contactLink.textContent = header.menu.contact_us;
}

// Load main banner content
function loadMainBannerContent(banner) {
    setTextContent('#main-banner-heading', banner.heading);
    setTextContent('#main-banner-subheading', banner.subheading);
    setTextContent('#main-banner-description', banner.description);
    setTextContent('#contact-button', banner.contact_button);
    
    // Banner image alt text
    const bannerImg = document.querySelector('.right-image img');
    if (bannerImg) bannerImg.alt = banner.image_alt;
}

// Load about section content
function loadAboutContent(about) {
    setTextContent('#about-heading', about.heading.main);
    setTextContent('#about-subheading', about.heading.sub);
    setTextContent('#about-description', about.description);
    setTextContent('#guiding-heading', about.guiding_heading);
    
    // Skills
    setTextContent('#skill-development', about.skills.development);
    setTextContent('#skill-configuration', about.skills.configuration);
    setTextContent('#skill-support', about.skills.support);
    
    // About image alt text
    const aboutImg = document.querySelector('.about-left-image img');
    if (aboutImg) aboutImg.alt = about.image_alt;
}

// Load services section content
function loadServicesContent(services) {
    setTextContent('#services-heading', services.heading.main);
    setTextContent('#services-subheading', services.heading.sub);
    
    // Service names in tabs
    const servicesList = [
        'sales_cloud',
        'marketing_cloud',
        'service_cloud',
        'experience_cloud',
        'integrations'
    ];
    
    servicesList.forEach((service, index) => {
        const num = index + 1;
        const serviceContent = services.services[service];
        
        setTextContent(`#service-${num}-name`, serviceContent.title.split(':')[0]);
        setTextContent(`#service-${num}-title`, serviceContent.title);
        setTextContent(`#service-${num}-description`, serviceContent.description);
        
        const featuresElement = document.querySelector(`#service-${num}-features`);
        if (featuresElement) {
            featuresElement.innerHTML = createBenefitsList(serviceContent.benefits);
        }
        
        // Service images alt text
        const serviceImg = document.querySelector(`.services-image-0${num} img`);
        if (serviceImg) serviceImg.alt = serviceContent.image_alt;
        setTextContent(`#service-${num}-footer`, serviceContent.footer);

    });
}

// Load contact section content
function loadContactContent(contact) {
    setTextContent('#contact-heading', contact.heading.main);
    setTextContent('#contact-subheading', contact.heading.sub);
    
    // Form labels
    const formLabels = document.querySelectorAll('.fill-form label');
    if (formLabels.length > 0) {
        formLabels[0].textContent = contact.form.labels.name;
        formLabels[1].textContent = contact.form.labels.email;
        formLabels[2].textContent = contact.form.labels.company;
        formLabels[3].textContent = contact.form.labels.message;
    }
    
    // Submit button
    const submitBtn = document.querySelector('.fill-form button');
    if (submitBtn) submitBtn.textContent = contact.form.button;
    
    // Contact info
    const emailLink = document.querySelector('#contact-email');
    if (emailLink) {
        emailLink.textContent = contact.contact_info.email.value;
        emailLink.href = `mailto:${contact.contact_info.email.value}`;
    }
    
    setTextContent('#contact-location', contact.contact_info.location.value);
}

// Load footer content
function loadFooterContent(footer) {
    const footerElement = document.querySelector('footer');
    if (footerElement) {
        footerElement.textContent = footer.text;
    }
}

// Helper function to create benefits list HTML
function createBenefitsList(benefits) {
    return benefits.map(benefit => `<p><i class="fa fa-check"></i> ${benefit}</p>`).join('');
}

// Helper function to safely set text content
function setTextContent(selector, text) {
    const element = document.querySelector(selector);
    if (element && text) {
        element.textContent = text;
    }
}

// Load content when DOM is ready
document.addEventListener('DOMContentLoaded', () => loadLanguageContent('en'));


</script>
